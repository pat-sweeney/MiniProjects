# Configures GitHub's automatically generated release notes.
# https://docs.github.com/repositories/releasing-projects-on-github/automatically-generated-release-notes
changelog:
  exclude:
    labels:
      - ignore-for-release
      - duplicate
    authors:
      - dependabot
  categories:
    - title: ✨ Features
      labels:
        - feature
        - enhancement
    - title: 🐛 Bug Fixes
      labels:
        - bug
        - fix
    - title: 🖼 Slideshow & Media
      labels:
        - slideshow
        - media
        - video
    - title: 🧠 Recognition & AI
      labels:
        - faces
        - voice
        - llm
    - title: 📦 Packaging & Updates
      labels:
        - packaging
        - build
        - ci
        - updater
    - title: 📝 Documentation
      labels:
        - documentation
    - title: 🔧 Other Changes
      labels:
        - '*'
